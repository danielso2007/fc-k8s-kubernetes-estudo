version: "3.9"

services:

  hello-k8s:
    build:
      context: .
      dockerfile: Dockerfile
    image: hello-k8s:latest
    container_name: hello-k8s
    ports:
      - "8080:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-XX:+UseContainerSupport -XX:InitialRAMPercentage=50 -XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+TieredCompilation -XX:TieredStopAtLevel=1 -XX:+ExitOnOutOfMemoryError
    deploy:
      resources:
        limits:
          memory: 512m
